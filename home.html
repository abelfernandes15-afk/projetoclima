<style>

/* =========================
HOME
========================= */

.home{
    width: 100%;
    min-height: 100vh;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("img/fundo.png");

    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 40px 20px;
}

.home-content{
    text-align: center;
    color: white;
    max-width: 750px;

    animation: fadeUp 1s ease;
}

.home-content h1{
    font-size: clamp(45px, 7vw, 75px);
    margin-bottom: 20px;
    letter-spacing: 3px;
}

.home-content p{
    font-size: clamp(18px, 2vw, 28px);
    line-height: 1.7;
    margin-bottom: 35px;
}

.home-content a{
    display: inline-block;

    padding: 15px 32px;

    background: linear-gradient(90deg,#ff5722,#ff9800);

    color: white;

    text-decoration: none;

    border-radius: 10px;

    font-weight: bold;

    transition: 0.3s;
}

.home-content a:hover{
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* =========================
CARDS DOS PAÍSES
========================= */

.paises{
    padding: 60px 25px;
}

.paises h2{
    text-align: center;
    margin-bottom: 40px;

    font-size: clamp(28px,4vw,40px);

    color: #d84315;
}

.cards{
    display: grid;

    grid-template-columns:
    repeat(auto-fit,minmax(240px,1fr));

    gap: 25px;
}

.card{
    background: white;

    border-radius: 18px;

    overflow: hidden;

    box-shadow: 0 8px 25px rgba(0,0,0,0.12);

    transition: 0.4s;
}

.card:hover{
    transform: translateY(-10px);
}

.card img{
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content{
    padding: 22px;
    text-align: center;
}

.card-content h3{
    margin-bottom: 15px;
    color: #4e342e;
    font-size: 22px;
}

.card-content a{
    display: inline-block;

    padding: 10px 20px;

    background: linear-gradient(90deg,#ff5722,#ff9800);

    color: white;

    text-decoration: none;

    border-radius: 8px;

    transition: 0.3s;
}

.card-content a:hover{
    transform: scale(1.05);
}

/* =========================
FOOTER
========================= */

footer{
    background: #0d1b2a;
    color: white;
    text-align: center;
    padding: 22px;
}

/* =========================
ANIMAÇÃO
========================= */

@keyframes fadeUp{

    from{
        opacity:0;
        transform: translateY(40px);
    }

    to{
        opacity:1;
        transform: translateY(0);
    }

}

/* =========================
RESPONSIVO
========================= */

@media(max-width:768px){

    .home-content h1{
        font-size: 50px;
    }

    .home-content p{
        font-size: 18px;
    }

}

</style>

</head>
