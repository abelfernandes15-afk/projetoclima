<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLIMAPP</title>
<script>
// Página de entrada: redireciona para home se logado, senão para login
(function() {
    var logado = localStorage.getItem("logado");
    if (logado === "true") {
        window.location.replace("home.html");
    } else {
        window.location.replace("login.html");
    }
})();
</script>
</head>
<body></body>
</html>
