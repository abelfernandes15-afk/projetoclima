<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CLIMAPP - Login</title>

<!-- ICONES -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="style.css">

<style>

/* =========================
LOGIN
========================= */

body{
    background:
    linear-gradient(135deg,#ff6a00,#ff3c3c);

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;

    padding: 20px;
}

/* =========================
CONTAINER
========================= */

.login-container{

    width: 950px;
    max-width: 100%;

    min-height: 550px;

    display: flex;

    border-radius: 25px;

    overflow: hidden;

    background: white;

    box-shadow: 0 15px 40px rgba(0,0,0,0.2);

    animation: fadeUp 0.8s ease;
}

/* =========================
LADO ESQUERDO
========================= */

.login-left{

    width: 45%;

    background: #fff3e0;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 30px;
}

.login-circle{

    width: 320px;
    height: 320px;

    border-radius: 50%;

    overflow: hidden;

    border: 8px solid #ff9800;

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.login-circle img{

    width: 100%;
    height: 100%;

    object-fit: cover;
}

/* =========================
LADO DIREITO
========================= */

.login-right{

    width: 55%;

    background:
    linear-gradient(135deg,#ff6a00,#ff3c3c);

    padding: 60px;

    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;
}

.login-right h1{

    font-size: 50px;

    margin-bottom: 35px;
}

/* =========================
INPUTS
========================= */

.input-box{

    width: 100%;

    background: #fff8ef;

    margin-bottom: 20px;

    border-radius: 40px;

    padding: 16px 20px;

    display: flex;
    align-items: center;

    gap: 15px;

    transition: 0.3s;
}

.input-box:hover{
    transform: scale(1.02);
}

.input-box i{

    color: #ff7b00;

    font-size: 18px;
}

.input-box input{

    width: 100%;

    border: none;
    outline: none;

    background: transparent;

    font-size: 16px;

    color: #333;
}

/* =========================
BOTÃO
========================= */

.btn-login{

    width: 100%;

    padding: 15px;

    border: none;

    border-radius: 40px;

    background: #ffca3a;

    color: #8a2f00;

    font-size: 18px;
    font-weight: bold;

    cursor: pointer;

    transition: 0.3s;
}

.btn-login:hover{

    transform: scale(1.03);

    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* =========================
LINK
========================= */

.cadastro-link{

    margin-top: 25px;

    text-align: center;
}

.cadastro-link a{

    color: white;

    font-weight: bold;

    text-decoration: none;
}

.cadastro-link a:hover{
    text-decoration: underline;
}

/* =========================
ANIMAÇÃO
========================= */

@keyframes fadeUp{

    from{
        opacity:0;
        transform: translateY(40px);
    }

    to{
        opacity:1;
        transform: translateY(0);
    }

}

/* =========================
RESPONSIVO
========================= */

@media(max-width:850px){

    .login-container{
        flex-direction: column;
    }

    .login-left,
    .login-right{
        width: 100%;
    }

    .login-left{
        padding: 40px 20px;
    }

    .login-circle{
        width: 220px;
        height: 220px;
    }

    .login-right{
        padding: 40px 25px;
    }

    .login-right h1{
        font-size: 38px;
    }

}

</style>

</head>

<body>

<!-- CONTAINER -->

<div class="login-container">

<!-- ESQUERDA -->

<div class="login-left">

<div class="login-circle">

<img src="img/boneco.svg"
alt="Usuário">

</div>

</div>

<!-- DIREITA -->

<div class="login-right">

<h1>Entrar</h1>

<!-- EMAIL -->

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Digite seu e-mail"
onkeydown="if(event.key==='Enter') document.getElementById('senha').focus()">

</div>

<!-- SENHA -->

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="senha"
placeholder="Digite sua senha"
onkeydown="if(event.key==='Enter') login()">

</div>

<!-- BOTÃO -->

<button
type="button"
class="btn-login"
onclick="login()">

Entrar

</button>

<!-- LINK -->

<div class="cadastro-link">

Não possui conta?
<a href="cadastro.html">
Criar Conta

</a>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
